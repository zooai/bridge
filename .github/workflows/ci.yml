name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  GOPRIVATE: "github.com/luxfi/*"
  GONOSUMDB: "github.com/luxfi/*"
  GONOSUMCHECK: "github.com/luxfi/*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Regenerate go.sum
        run: |
          rm -f go.sum
          go mod download
          go mod tidy
      - run: go build ./...
      - run: go vet ./...
      - name: Docker login to DOCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}
      - name: Docker login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            GITHUB_ACTOR=${{ github.actor }}
          tags: |
            registry.digitalocean.com/hanzo/zoo-bridge:${{ github.ref_name }}
            registry.digitalocean.com/hanzo/zoo-bridge:latest
            ghcr.io/zoo-labs/bridge:${{ github.ref_name }}
            ghcr.io/zoo-labs/bridge:latest
