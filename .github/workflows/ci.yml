name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  GOPRIVATE: "github.com/luxfi/*"
  GONOSUMDB: "github.com/luxfi/*"
  GONOSUMCHECK: "github.com/luxfi/*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Regenerate go.sum
        run: |
          rm -f go.sum
          go mod download
          go mod tidy
      - run: go build ./...
      - run: go vet ./...

  docker:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: ghcr.io/zoo-labs/bridge:latest,ghcr.io/zoo-labs/bridge:${{ github.sha }}
