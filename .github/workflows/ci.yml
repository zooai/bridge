name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOPRIVATE: "github.com/luxfi/*"
  GONOSUMDB: "github.com/luxfi/*"
  GONOSUMCHECK: "github.com/luxfi/*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Regenerate go.sum
        run: |
          rm -f go.sum
          go mod download
          go mod tidy
      - run: go build ./...
      - run: go vet ./...
