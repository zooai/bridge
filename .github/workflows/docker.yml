name: Docker

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: zooai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/zooai/bridge
      runner-amd64: zoo-build-linux-amd64
      runner-arm64: zoo-build-linux-amd64
      runner-deploy: zoo-build-linux-amd64
      platforms: "linux/amd64"
    secrets: inherit

  notify-universe:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: zoo-build-linux-amd64
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_PAT }}
          repository: zooai/universe
          event-type: image-published
          client-payload: |
            {
              "service": "bridge",
              "image": "ghcr.io/zooai/bridge",
              "tag": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}"
            }
